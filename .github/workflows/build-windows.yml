name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pikepdf pypdf ttkbootstrap Pillow pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --name "PDFIndsigt" --windowed --onefile --noconfirm --clean --add-data "i18n;i18n" --add-data "assets;assets" --hidden-import pikepdf --hidden-import "pikepdf._core" --hidden-import pypdf --hidden-import ttkbootstrap --hidden-import "ttkbootstrap.themes" --hidden-import "ttkbootstrap.themes.standard" --hidden-import PIL --exclude-module matplotlib --exclude-module numpy --exclude-module scipy --exclude-module pandas main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PDFIndsigt-Windows
          path: dist/PDFIndsigt.exe
